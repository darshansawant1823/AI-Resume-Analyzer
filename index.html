<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Resume Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'sans-serif'],
            },
            colors: {
              // Apple System Colors
              'system-bg': '#F5F5F7', // System Gray 6
              'system-blue': '#007AFF',
              'system-blue-hover': '#0062CC',
              'system-green': '#34C759',
              'system-red': '#FF3B30',
              'system-orange': '#FF9500',
              'system-gray': '#8E8E93',
              'system-gray-2': '#AEAEB2',
              'system-gray-6': '#F2F2F7',
              // Mappings to existing app usage
              primary: '#007AFF', 
              secondary: '#5856D6', // System Indigo
              accent: '#0A84FF',
              neutral: '#F5F5F7',
            },
            boxShadow: {
              'apple-card': '0 8px 30px rgba(0, 0, 0, 0.04)',
              'apple-button': '0 4px 12px rgba(0, 122, 255, 0.15)',
              'apple-hover': '0 6px 16px rgba(0, 0, 0, 0.08)',
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
            },
            animation: {
              'spin-slow': 'spin 3s linear infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'scale-in': 'scaleIn 0.2s ease-out forwards',
            },
            keyframes: {
              scaleIn: {
                '0%': { transform: 'scale(0.95)', opacity: '0' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* macOS-like Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #C1C1C1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #A8A8A8;
      }
      
      /* Smooth text rendering */
      body {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* iOS-like tap highlight */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  <script type="importmap">

    "react": "https://aistudiocdn.com/react@^19.2.0"
  }
}
</script>
</head>
  <body class="bg-system-bg text-gray-900">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
